<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Login — Monitor de Alagamentos Belém</title>
  <link rel="stylesheet" href="css/style.css">
</head>
<body class="login-page">
  <div class="login-container">
    <div class="login-card">
      <div class="login-logo">
        <span class="logo-icon">🌊</span>
        <h1>Monitor de Alagamentos</h1>
        <p>Belém do Pará — Área Restrita</p>
      </div>

      <div id="msg-erro" class="alert alert-error hidden"></div>

      <form id="form-login">
        <div class="form-group">
          <label for="email">Email</label>
          <input type="email" id="email" required placeholder="seu@email.gov.br" autocomplete="username">
        </div>
        <div class="form-group">
          <label for="senha">Senha</label>
          <input type="password" id="senha" required placeholder="••••••••" autocomplete="current-password">
        </div>
        <button type="submit" class="btn-submit" id="btn-login">
          Entrar
        </button>
      </form>

      <div class="login-hint">
        <small>Acesso exclusivo para administradores autorizados.</small>
      </div>
    </div>
  </div>

  <script src="js/admin.js"></script>
</body>
</html>
